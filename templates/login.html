{% extends "base.html" %}
{% block title %}Login — Conferência de Kits{% endblock %}
{% block content %}
<div style="max-width: 380px; margin: 60px auto;">
    <div class="card">
        <h1 style="text-align:center;">📦 Conferência de Kits</h1>
        {% if erro %}
        <div class="alert alert-danger">{{ erro }}</div>
        {% endif %}
        <form method="post" action="/login">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" autofocus required
                       autocomplete="username" style="font-size:16px;">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required
                       autocomplete="current-password" style="font-size:16px;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:16px;">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
