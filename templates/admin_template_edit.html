{% extends "base.html" %}
{% block title %}Editar Template — {{ template.nome }}{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
    <a href="/admin/templates" class="btn btn-sm btn-primary">← Voltar</a>
    <h1 style="margin:0;">Editar Template</h1>
</div>

{% if erro %}
<div class="alert alert-danger">{{ erro }}</div>
{% endif %}

<div class="card">
    <form method="post" action="/admin/templates/{{ template.id }}/edit" id="form-edit">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
            <div class="form-group">
                <label>Nome do Kit</label>
                <input type="text" name="nome" required value="{{ template.nome }}">
            </div>
            <div class="form-group">
                <label>Cliente</label>
                <input type="text" name="cliente" required value="{{ template.cliente }}">
            </div>
        </div>

        <h2>Itens do Kit</h2>
        <div id="itens-container">
            {% for item in itens %}
            <div class="item-linha" style="display:grid; grid-template-columns:2fr 80px 100px auto; gap:8px; margin-bottom:8px;">
                <select name="item_tipo_id_{{ loop.index0 }}" required>
                    <option value="">— selecione o tipo —</option>
                    {% for tipo in tipos_catalogo %}
                    <option value="{{ tipo.id }}" {{ 'selected' if tipo.id == item.item_tipo_id else '' }}>
                        {{ tipo.nome }}
                    </option>
                    {% endfor %}
                </select>
                <input type="number" name="qtd_{{ loop.index0 }}" value="{{ item.quantidade_exigida }}" min="1" placeholder="Qtd">
                <label style="display:flex;align-items:center;gap:6px;margin:0;">
                    <input type="checkbox" name="obrigatorio_{{ loop.index0 }}" value="1"
                           {{ 'checked' if item.obrigatorio else '' }}> Obrigatório
                </label>
                <button type="button" onclick="removerLinha(this)" class="btn btn-sm btn-danger">✕</button>
            </div>
            {% endfor %}
        </div>

        <button type="button" onclick="adicionarLinha()" class="btn btn-sm btn-warning" style="margin-bottom:20px;">
            + Adicionar Item
        </button>

        <div style="display:flex; gap:10px; margin-top:8px;">
            <button type="submit" class="btn btn-success">💾 Salvar Alterações</button>
            <a href="/admin/templates" class="btn btn-danger">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
{% block scripts %}
<script>
let idx = {{ itens | length }};
const catalogo = {{ tipos_catalogo | tojson }};

function adicionarLinha() {
    const container = document.getElementById('itens-container');
    const div = document.createElement('div');
    div.className = 'item-linha';
    div.style.cssText = 'display:grid;grid-template-columns:2fr 80px 100px auto;gap:8px;margin-bottom:8px;';
    let opts = '<option value="">— selecione o tipo —</option>';
    catalogo.forEach(t => { opts += `<option value="${t.id}">${t.nome}</option>`; });
    div.innerHTML = `
        <select name="item_tipo_id_${idx}" required>${opts}</select>
        <input type="number" name="qtd_${idx}" value="1" min="1">
        <label style="display:flex;align-items:center;gap:6px;margin:0;">
            <input type="checkbox" name="obrigatorio_${idx}" value="1" checked> Obrigatório
        </label>
        <button type="button" onclick="removerLinha(this)" class="btn btn-sm btn-danger">✕</button>`;
    container.appendChild(div);
    idx++;
}

function removerLinha(btn) {
    const container = document.getElementById('itens-container');
    if (container.children.length > 1) btn.closest('.item-linha').remove();
}
</script>
{% endblock %}
